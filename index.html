<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Kedai Makan</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
.header{background:#2e7d32;color:white;padding:15px;text-align:center;font-size:20px;}

.container{display:flex;flex-wrap:wrap;}

.menu,.cashier{flex:1;min-width:300px;padding:10px;}

.card{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

img{width:100%;height:120px;object-fit:cover;border-radius:10px;}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#43a047;
  color:white;
  font-size:16px;
}

.delete{
  background:#e53935;
}

h3{text-align:center;}
</style>
</head>

<body>

<div class="header">🍽️ POS KEDAI MAKAN</div>

<div class="container">

<!-- MENU -->
<div class="menu">
<h3>Menu</h3>

<div class="card">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc500f">
<b>Nasi Goreng</b><br>RM6
<button onclick="order('Nasi Goreng',6)">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1605478581570-3b6a3b6c7b5d">
<b>Teh Ais</b><br>RM2.50
<button onclick="order('Teh Ais',2.5)">Order</button>
</div>

</div>

<!-- CASHIER -->
<div class="cashier">
<h3>📥 Order Masuk (LIVE)</h3>
<div id="orders"></div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 CONFIG KAU (DAH BETUL)
const firebaseConfig = {
  apiKey: "AIzaSyB4pceskA3HlPwfF9GOsWzuJ2vKQ-pfjQY",
  authDomain: "pos-kedai-95034.firebaseapp.com",
  databaseURL: "https://pos-kedai-95034-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pos-kedai-95034",
  storageBucket: "pos-kedai-95034.firebasestorage.app",
  messagingSenderId: "311237939351",
  appId: "1:311237939351:web:d3e3f1571204bbdad999d2",
  measurementId: "G-9SYMMD3D5Y"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 📱 SUBMIT ORDER (INI YANG KAU NAK)
window.order = function(item, price){
  push(ref(db,"orders"),{
    item:item,
    price:price,
    time:new Date().toLocaleTimeString()
  });

  alert("Order dihantar!");
}

// 🗑 DELETE ORDER
window.delOrder = function(id){
  remove(ref(db,"orders/"+id));
}

// 💻 LIVE UPDATE CASHIER
onValue(ref(db,"orders"), (snapshot)=>{
  const data = snapshot.val();
  const box = document.getElementById("orders");

  box.innerHTML = "";

  if(data){
    for(let id in data){
      box.innerHTML += `
      <div class="card">
        <b>${data[id].item}</b><br>
        RM ${data[id].price}<br>
        <small>${data[id].time}</small><br>
        <button class="delete" onclick="delOrder('${id}')">Delete</button>
      </div>
      `;
    }
  }
});

</script>

</body>
</html>
