<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS Kedai Makan</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eef2f3;
}

.header {
    background: linear-gradient(90deg,#2e7d32,#43a047);
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

.menu, .cart {
    flex: 1;
    min-width: 300px;
    padding: 10px;
}

.card {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

button {
    padding: 10px;
    margin: 5px 3px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.add {
    background: #4caf50;
    color: white;
}

.plus {
    background: #2196f3;
    color: white;
}

.minus {
    background: #ff9800;
    color: white;
}

.delete {
    background: #f44336;
    color: white;
}

.total {
    font-size: 22px;
    font-weight: bold;
    text-align: right;
    margin: 10px;
}
</style>
</head>

<body>

<div class="header">🍽️ POS KEDAI MAKAN</div>

<div class="container">

<!-- MENU -->
<div class="menu">
    <h3>Menu</h3>

    <div class="card">
        Nasi Goreng - RM6
        <br>
        <button class="add" onclick="add('Nasi Goreng',6)">Tambah</button>
    </div>

    <div class="card">
        Teh Ais - RM2.50
        <br>
        <button class="add" onclick="add('Teh Ais',2.5)">Tambah</button>
    </div>

    <div class="card">
        Mee Goreng - RM5
        <br>
        <button class="add" onclick="add('Mee Goreng',5)">Tambah</button>
    </div>
</div>

<!-- CART -->
<div class="cart">
    <h3>Order</h3>
    <div id="cart"></div>

    <div class="total" id="total">Total: RM0.00</div>

    <button class="delete" onclick="clearCart()">Clear</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function add(name, price) {
    let item = cart.find(i => i.name === name);

    if (item) {
        item.qty++;
    } else {
        cart.push({ name, price, qty: 1 });
    }

    save();
    render();
}

function remove(name) {
    cart = cart.filter(i => i.name !== name);
    save();
    render();
}

function render() {
    let box = document.getElementById("cart");
    box.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        total += item.price * item.qty;

        box.innerHTML += `
        <div class="card">
            <b>${item.name}</b><br>
            RM ${(item.price * item.qty).toFixed(2)}<br>

            <button class="plus" onclick="add('${item.name}',${item.price})">+</button>

            <button class="minus" onclick="
                if(item.qty>1){item.qty--}else{remove('${item.name}')}
                save(); render();
            ">-</button>

            <button class="delete" onclick="remove('${item.name}')">Delete</button>
        </div>
        `;
    });

    document.getElementById("total").innerText =
        "Total: RM " + total.toFixed(2);
}

function clearCart() {
    cart = [];
    save();
    render();
}

render();
</script>

</body>
</html>
