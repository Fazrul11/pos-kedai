<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS PRO LIVE FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f3;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container{
  display:flex;
  flex-wrap:wrap;
}

.box{
  flex:1;
  min-width:300px;
  padding:10px;
}

.card{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

.add{background:#1976d2;color:white;}
.submit{background:#43a047;color:white;}
.delete{background:#e53935;color:white;}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

.tableBtn{
  width:48%;
  margin:2px;
  background:#555;
  color:white;
}
.badge{
  display:inline-block;
  padding:3px 8px;
  background:#ddd;
  border-radius:5px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">🍽️ POS PRO LIVE SYSTEM (FIXED)</div>

<div class="container">

<!-- MENU -->
<div class="box">
<h3>Menu</h3>

<input type="text" id="search" placeholder="🔍 Search menu..." onkeyup="filterMenu()">

<div id="menu"></div>
</div>

<!-- CART -->
<div class="box">
<h3>🛒 Cart</h3>
<div id="cart"></div>

<h3>🪑 Meja</h3>
<div id="tables"></div>

<button class="submit" onclick="submitOrder()">SUBMIT ORDER</button>
</div>

<!-- LIVE -->
<div class="box">
<h3>📥 LIVE ORDER</h3>
<div id="orders"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4pceskA3HlPwfF9GOsWzuJ2vKQ-pfjQY",
  authDomain: "pos-kedai-95034.firebaseapp.com",
  databaseURL: "https://pos-kedai-95034-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pos-kedai-95034",
  storageBucket: "pos-kedai-95034.firebasestorage.app",
  messagingSenderId: "311237939351",
  appId: "1:311237939351:web:d3e3f1571204bbdad999d2",
  measurementId: "G-9SYMMD3D5Y"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let cart = [];
let table = null;

// MENU
const menuData = [
["Nasi Goreng",6],
["Nasi Ayam",7],
["Mee Goreng",5],
["Char Kuey Teow",6],
["Laksa",7],
["Burger",5],
["Hotdog",4],
["Pizza",12],
["Roti Canai",2],
["Teh Ais",2.5],
["Kopi",2],
["Milo Ais",3],
["Nasi Lemak",3],
["Sate",8],
["Ice Cream",3]
];

// LOAD MENU
function loadMenu(){
  let box = document.getElementById("menu");
  box.innerHTML = "";

  menuData.forEach(m=>{
    box.innerHTML += `
    <div class="card menuItem">
      <b class="name">${m[0]}</b><br>
      <span class="badge">RM ${m[1]}</span>
      <button class="add" onclick="addCart('${m[0]}',${m[1]})">Add</button>
    </div>
    `;
  });
}

// SEARCH
window.filterMenu = function(){
  let val = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".menuItem").forEach(i=>{
    let name = i.querySelector(".name").innerText.toLowerCase();
    i.style.display = name.includes(val) ? "block" : "none";
  });
}

// CART
window.addCart = function(item,price){
  cart.push({item,price});
  renderCart();
}

function renderCart(){
  let box = document.getElementById("cart");
  box.innerHTML = "";

  cart.forEach((c,i)=>{
    box.innerHTML += `
    <div class="card">
      ${c.item} - RM ${c.price}
      <button class="delete" onclick="removeItem(${i})">Remove</button>
    </div>
    `;
  });
}

window.removeItem = function(i){
  cart.splice(i,1);
  renderCart();
}

// TABLES
function loadTables(){
  let box = document.getElementById("tables");
  box.innerHTML = "";

  for(let i=1;i<=10;i++){
    box.innerHTML += `
    <button class="tableBtn" onclick="selectTable(${i})">Meja ${i}</button>
    `;
  }
}

window.selectTable = function(t){
  table = t;
  alert("Meja " + t + " dipilih");
}

// SUBMIT
window.submitOrder = function(){

  if(cart.length==0){
    alert("Cart kosong!");
    return;
  }

  if(!table){
    alert("Pilih meja!");
    return;
  }

  let total = cart.reduce((a,b)=>a+b.price,0);

  push(ref(db,"orders"),{
    table:table,
    items:cart,
    total:total,
    time:new Date().toLocaleTimeString()
  });

  cart = [];
  table = null;
  renderCart();
}

// 🔥 FIXED LIVE LISTENER (INI PUNCA TAK LIVE SEBELUM NI)
function loadOrders(){
  const orderRef = ref(db,"orders");

  onValue(orderRef,(snap)=>{
    const data = snap.val();
    const box = document.getElementById("orders");

    box.innerHTML = "";

    if(data){
      Object.keys(data).reverse().forEach(id=>{
        let o = data[id];

        box.innerHTML += `
        <div class="card">
          <b>🪑 Meja ${o.table}</b><br>

          ${o.items.map(i=>`
            ${i.item} - RM ${i.price}<br>
          `).join("")}

          <hr>
          <b>Total RM ${o.total}</b><br>
          <small>${o.time}</small><br>

          <button class="delete" onclick="delOrder('${id}')">Delete</button>
        </div>
        `;
      });
    }else{
      box.innerHTML = "<p>No order yet...</p>";
    }
  });
}

// DELETE
window.delOrder = function(id){
  remove(ref(db,"orders/"+id));
}

loadMenu();
loadTables();
loadOrders();

</script>

</body>
</html>
