<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Kedai Makan</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

.header{
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
}

.menu, .cashier{
    flex:1;
    min-width:300px;
    padding:10px;
}

.card{
    background:white;
    padding:15px;
    margin:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:5px;
}

.orderBtn{
    background:#43a047;
    color:white;
}

.deleteBtn{
    background:#e53935;
    color:white;
}

</style>
</head>

<body>

<div class="header">🍽️ POS KEDAI MAKAN REAL-TIME</div>

<div class="container">

<!-- MENU -->
<div class="menu">
<h3>Menu</h3>

<div class="card">
Nasi Goreng - RM6
<br>
<button class="orderBtn" onclick="order('Nasi Goreng',6)">Order</button>
</div>

<div class="card">
Teh Ais - RM2.50
<br>
<button class="orderBtn" onclick="order('Teh Ais',2.5)">Order</button>
</div>

<div class="card">
Mee Goreng - RM5
<br>
<button class="orderBtn" onclick="order('Mee Goreng',5)">Order</button>
</div>

</div>

<!-- CASHIER -->
<div class="cashier">
<h3>📥 Order Masuk (LIVE)</h3>
<div id="orders"></div>
</div>

</div>

<script>
// 🔥 FIREBASE CONFIG (KAU PUNYA)
const firebaseConfig = {
  apiKey: "AIzaSyB4pceskA3HlPwfF9GOsWzuJ2vKQ-pfjQY",
  authDomain: "pos-kedai-95034.firebaseapp.com",
  databaseURL: "https://pos-kedai-95034-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pos-kedai-95034",
  storageBucket: "pos-kedai-95034.firebasestorage.app",
  messagingSenderId: "311237939351",
  appId: "1:311237939351:web:d3e3f1571204bbdad999d2",
  measurementId: "G-9SYMMD3D5Y"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 📱 HANTAR ORDER
function order(item, price){
    db.ref("orders").push({
        item: item,
        price: price,
        time: new Date().toLocaleTimeString()
    });
}

// 💻 LIVE CASHIER
db.ref("orders").on("value", snapshot => {
    let data = snapshot.val();
    let box = document.getElementById("orders");
    box.innerHTML = "";

    for(let id in data){
        box.innerHTML += `
        <div class="card">
            <b>${data[id].item}</b><br>
            RM ${data[id].price}<br>
            <small>${data[id].time}</small><br>

            <button class="deleteBtn" onclick="delOrder('${id}')">Delete</button>
        </div>
        `;
    }
});

// 🗑 DELETE ORDER
function delOrder(id){
    db.ref("orders/" + id).remove();
}

</script>

</body>
</html>
