<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS Kedai Makan</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

header {
    background: #2e7d32;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    display: flex;
    padding: 10px;
}

.menu, .cart {
    flex: 1;
    padding: 10px;
}

.card {
    background: white;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.add {
    background: #4caf50;
    color: white;
}

.remove {
    background: red;
    color: white;
}

.total {
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
🍽️ POS KEDAI MAKAN
</header>

<div class="container">

<!-- MENU -->
<div class="menu">
    <h3>Menu</h3>

    <div class="card">
        Nasi Goreng - RM6
        <br>
        <button class="add" onclick="addItem('Nasi Goreng',6)">Tambah</button>
    </div>

    <div class="card">
        Teh Ais - RM2.50
        <br>
        <button class="add" onclick="addItem('Teh Ais',2.5)">Tambah</button>
    </div>

    <div class="card">
        Mee Goreng - RM5
        <br>
        <button class="add" onclick="addItem('Mee Goreng',5)">Tambah</button>
    </div>
</div>

<!-- CART -->
<div class="cart">
    <h3>Order</h3>
    <div id="cart"></div>

    <p class="total" id="total">Total: RM0.00</p>

    <button class="remove" onclick="clearCart()">Reset</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function addItem(name, price) {
    let item = cart.find(i => i.name === name);

    if (item) {
        item.qty++;
    } else {
        cart.push({ name, price, qty: 1 });
    }

    save();
    render();
}

function removeItem(name) {
    cart = cart.filter(i => i.name !== name);
    save();
    render();
}

function render() {
    let div = document.getElementById("cart");
    div.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        total += item.price * item.qty;

        div.innerHTML += `
        <div class="card">
            ${item.name} x${item.qty}
            <br>
            RM ${(item.price * item.qty).toFixed(2)}
            <br>
            <button onclick="addItem('${item.name}',${item.price})">+</button>
            <button onclick="item.qty--; save(); render()">-</button>
            <button onclick="removeItem('${item.name}')">Delete</button>
        </div>`;
    });

    document.getElementById("total").innerText =
        "Total: RM " + total.toFixed(2);
}

function clearCart() {
    cart = [];
    save();
    render();
}

render();
</script>

</body>
</html>
